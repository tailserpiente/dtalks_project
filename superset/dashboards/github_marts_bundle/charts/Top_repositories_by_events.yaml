slice_name: Top repositories by events
description: Repositories with highest total_events in mart
viz_type: table
params:
  datasource: 0__table
  viz_type: table
  query_mode: aggregate
  groupby:
    - repo_name
  metrics:
    - expressionType: SIMPLE
      column:
        column_name: total_events
      aggregate: SUM
      label: Total events
    - expressionType: SIMPLE
      column:
        column_name: unique_contributors
      aggregate: MAX
      label: Contributors
    - expressionType: SIMPLE
      column:
        column_name: total_stars
      aggregate: SUM
      label: Star events (sum)
  all_columns: []
  adhoc_filters: []
  order_by_cols: []
  row_limit: 15
  include_time: false
  order_desc: true
  page_length: 0
  percent_metrics: []
  show_cell_bars: true
  table_timestamp_format: smart_date
  time_grain_sqla: null
  time_range: No filter
  extra_form_data: {}
query_context: null
cache_timeout: null
